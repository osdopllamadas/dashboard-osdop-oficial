version: '3.3'
services:
  app:
    image: dashboard-osdop:latest
    ports:
      - "3000:3000"
    environment:
      VITE_ULTRAVOX_KEY: "MnO6Ztj0.GgITCvEoij1dLRgGTFWemaNCwZtHhZ9c"
      PORT: "3000"
    networks:
      - BelanzeNet
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=BelanzeNet"
        - "traefik.http.routers.osdop.rule=Host(`dashboard.mateoia.store`)"
        - "traefik.http.routers.osdop.entrypoints=websecure"
        - "traefik.http.routers.osdop.tls=true"
        - "traefik.http.services.osdop.loadbalancer.server.port=3000"

networks:
  BelanzeNet:
    external: true
