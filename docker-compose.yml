version: '3.3'
services:
  dashboard-osdop:
    image: dashboard-osdop:latest
    build: .
    ports:
      - "3000:3000"
    environment:
      VITE_ULTRAVOX_KEY: "MnO6Ztj0.GgITCvEoij1dLRgGTFWemaNCwZtHhZ9c"
      PORT: "3000"
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        # Estas líneas le dicen a Traefik cómo manejar tu dominio
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard-osdop.rule=Host(`dashboard.mateoia.store`)"
        - "traefik.http.routers.dashboard-osdop.entrypoints=websecure"
        - "traefik.http.routers.dashboard-osdop.tls=true"
        - "traefik.http.services.dashboard-osdop.loadbalancer.server.port=3000"
